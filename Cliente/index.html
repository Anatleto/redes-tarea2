<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Sensor con Base de Datos JSON</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

    <div class="card">
        <div class="card-title">Entrada de Datos en Tiempo Real</div>

        <div class="actions-group">
            <button class="btn btn-secondary" onclick="limpiarTodo()">Limpiar Gráficos</button>
            <button class="btn" onclick="actualizarDatos()">Actualizar datos</button>
        </div>
    </div>

    <div class="card">
        <div class="card-title">Historial de Temperatura</div>
        <div class="canvas-container">
            <canvas id="tempChart"></canvas>
        </div>
        
        <div class="stats">
            <div class="stat-box">
                <div class="stat-val" id="temp-max">--</div>
                <div class="stat-lbl">Máximo</div>
            </div>
            <div class="stat-box">
                <div class="stat-val" id="temp-min">--</div>
                <div class="stat-lbl">Mínimo</div>
            </div>
            <div class="stat-box">
                <div class="stat-val" id="temp-prom">--</div>
                <div class="stat-lbl">Promedio</div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-title">Historial de Humedad</div>
        <div class="canvas-container">
            <canvas id="humChart"></canvas>
        </div>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-val" id="hum-max">--</div>
                <div class="stat-lbl">Máximo</div>
            </div>
            <div class="stat-box">
                <div class="stat-val" id="hum-min">--</div>
                <div class="stat-lbl">Mínimo</div>
            </div>
            <div class="stat-box">
                <div class="stat-val" id="hum-prom">--</div>
                <div class="stat-lbl">Promedio</div>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
